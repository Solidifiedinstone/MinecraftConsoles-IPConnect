name: Compile MinecraftConsoles

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure Build
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Compile
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release
          set BUILD_EXIT=%errorlevel%
          echo Build exited with code %BUILD_EXIT%
          if exist Release\MinecraftClient.exe (
            echo SUCCESS: MinecraftClient.exe found
          ) else (
            echo FAILURE: MinecraftClient.exe not found
            dir Release\ 2>nul
          )
          exit /b %BUILD_EXIT%

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Minecraft.Client.exe
          path: build/Release/MinecraftClient.exe
