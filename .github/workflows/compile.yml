name: Compile MinecraftConsoles

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure Build
        shell: cmd
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Compile
        shell: cmd
        run: cmake --build build --config Release -- /p:UseStructuredOutput=false > build_log.txt 2>&1
        continue-on-error: true

      - name: Show build log tail
        if: always()
        shell: cmd
        run: |
          echo === LAST 200 LINES OF BUILD LOG ===
          powershell -Command "Get-Content build_log.txt -Tail 200"
          echo === ERRORS ===
          findstr /I /C:"error" /C:"fatal" /C:"LNK" build_log.txt || echo No errors found in log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Minecraft.Client.exe
          path: build/Release/MinecraftClient.exe
