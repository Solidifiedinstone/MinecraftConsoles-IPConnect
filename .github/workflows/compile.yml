name: Compile MinecraftConsoles

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure Build
        shell: cmd
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Compile
        shell: cmd
        run: |
          set CL=/diagnostics:classic
          cmake --build build --config Release -- /p:UseStructuredOutput=false

      - name: Check output
        if: always()
        shell: cmd
        run: |
          dir build\Release\ 2>nul || echo No Release directory found
          dir build\Release\*.exe 2>nul || echo No exe files found

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Minecraft.Client.exe
          path: build/Release/MinecraftClient.exe
