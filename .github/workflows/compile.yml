name: Compile MinecraftConsoles

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure Build
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Compile
        run: |
          cd build
          cmake --build . --config Release -- /m /p:CL_MPCount=4 /clp:ForceConsoleColor /v:normal
        env:
          CL: /diagnostics:classic

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Minecraft.Client.exe
          path: build/Release/MinecraftClient.exe
