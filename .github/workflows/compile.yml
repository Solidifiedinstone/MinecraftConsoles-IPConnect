name: Compile MinecraftConsoles

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure Build
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Compile
        shell: cmd
        run: |
          cd build
          cmake --build . --config Release 2> build_errors.txt
          echo EXIT CODE: %errorlevel%
          type build_errors.txt

      - name: Show errors if failed
        if: failure()
        shell: cmd
        run: |
          if exist build\build_errors.txt type build\build_errors.txt
          echo ---
          dir build\Release\ 2>nul || echo No Release directory

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Minecraft.Client.exe
          path: build/Release/MinecraftClient.exe
